# ══════════════════════════════════════════════════════════════
# MySQL Configuration
# ══════════════════════════════════════════════════════════════
# Setup: CREATE DATABASE task;
# Default port: 3306

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/task?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: your_username
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
