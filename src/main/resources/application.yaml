spring:
  application:
    name: task-manager

  # Active profile — change this to 'mysql' or 'mariadb' to switch databases
  profiles:
    active: postgres

  # Common JPA settings (shared across all profiles)
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 3031

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
